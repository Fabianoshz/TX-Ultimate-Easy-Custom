          light_group: 1
          light_index: 1
          state: true
      - script.execute:
          id: light_set_state
          light_group: 2
          light_index: 1
          state: true
      - lambda: |-
          if (1 < id(gb_lights_1).size()) {
            auto call = id(gb_lights_1)[1]->turn_on();
            call.set_rgb(0, 1, 0);
            call.perform();
          }
          if (1 < id(gb_lights_2).size()) {
