substitutions:
  virtual_switch_on_red: "0.0"
  virtual_switch_on_green: "1.0"
  virtual_switch_on_blue: "0.0"
  virtual_switch_on_brightness: "1.0"

binary_sensor:
  - id: !extend bs_button_1_click_event
    on_press:
      then:
        - if:
            condition:
              lambda: "return ${gang_count} >= 1;"
            then:
              - switch.toggle: virtual_switch_1

  - id: !extend bs_button_2_click_event
    on_press:
      then:
        - if:
            condition:
              lambda: "return ${gang_count} >= 2;"
            then:
              - switch.toggle: virtual_switch_2

  - id: !extend bs_button_3_click_event
    on_press:
      then:
        - if:
            condition:
              lambda: "return ${gang_count} >= 3;"
            then:
              - switch.toggle: virtual_switch_3

  - id: !extend bs_button_4_click_event
    on_press:
      then:
        - if:
            condition:
              lambda: "return ${gang_count} >= 4;"
            then:
              - switch.toggle: virtual_switch_4

globals:
  - id: virtual_state_1
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_2
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_3
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_4
    type: bool
    restore_value: true
    initial_value: "false"

  # Saved light state before turning green (r, g, b, brightness) per switch per light group
  - id: vs1_g1_r
