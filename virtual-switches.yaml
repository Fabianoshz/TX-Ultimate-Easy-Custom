switch:
  - platform: template
    name: "Virtual Switch 1"
    id: virtual_switch_1
    internal: ${gang_count < 1}
    lambda: "return id(virtual_state_1);"
    turn_on_action:
      - globals.set:
          id: virtual_state_1
          value: "true"
      - lambda: |-
          if (0 < id(gb_lights_1).size()) {
            auto &v = id(gb_lights_1)[0]->current_values;
            id(vs1_g1_r) = v.get_red();
            id(vs1_g1_g) = v.get_green();
            id(vs1_g1_b) = v.get_blue();
            id(vs1_g1_bri) = v.get_brightness();
            auto call = id(gb_lights_1)[0]->turn_on();
            call.set_rgb(${virtual_switch_on_red}, ${virtual_switch_on_green}, ${virtual_switch_on_blue});
            call.set_brightness(${virtual_switch_on_brightness});
            call.perform();
          }
          if (0 < id(gb_lights_2).size()) {
            auto &v = id(gb_lights_2)[0]->current_values;
            id(vs1_g2_r) = v.get_red();
            id(vs1_g2_g) = v.get_green();
            id(vs1_g2_b) = v.get_blue();
            id(vs1_g2_bri) = v.get_brightness();
            auto call = id(gb_lights_2)[0]->turn_on();
            call.set_rgb(${virtual_switch_on_red}, ${virtual_switch_on_green}, ${virtual_switch_on_blue});
            call.set_brightness(${virtual_switch_on_brightness});
            call.perform();
          }
    turn_off_action:
      - globals.set:
          id: virtual_state_1
          value: "false"
      - lambda: |-
          if (0 < id(gb_lights_1).size()) {
            auto call = id(gb_lights_1)[0]->turn_on();
            call.set_rgb(id(vs1_g1_r), id(vs1_g1_g), id(vs1_g1_b));
            call.set_brightness(id(vs1_g1_bri));
            call.perform();
          }
          if (0 < id(gb_lights_2).size()) {
            auto call = id(gb_lights_2)[0]->turn_on();
            call.set_rgb(id(vs1_g2_r), id(vs1_g2_g), id(vs1_g2_b));
            call.set_brightness(id(vs1_g2_bri));
            call.perform();
          }

