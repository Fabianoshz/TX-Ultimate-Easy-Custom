binary_sensor:
  - id: !extend bs_button_1_click_event
    on_press:
      if:
        condition:
          lambda: "return ${gang_count} >= 1;"
        then:
          - switch.toggle: virtual_switch_1

  - id: !extend bs_button_2_click_event
    on_press:
      if:
        condition:
          lambda: "return ${gang_count} >= 2;"
        then:
          - switch.toggle: virtual_switch_2

  - id: !extend bs_button_3_click_event
    on_press:
      if:
        condition:
          lambda: "return ${gang_count} >= 3;"
        then:
          - switch.toggle: virtual_switch_3

  - id: !extend bs_button_4_click_event
    on_press:
      if:
        condition:
          lambda: "return ${gang_count} >= 4;"
        then:
          - switch.toggle: virtual_switch_4

globals:
  - id: virtual_state_1
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_2
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_3
    type: bool
    restore_value: true
    initial_value: "false"
  - id: virtual_state_4
    type: bool
    restore_value: true
    initial_value: "false"

switch:
  - platform: template
    name: "Virtual Switch 1"
    id: virtual_switch_1
    internal: ${gang_count} < 1
    lambda: "return id(virtual_state_1);"
    turn_on_action:
      - globals.set:
          id: virtual_state_1
          value: "true"
      - script.execute:
          id: light_set_state
          light_group: 1
          light_index: 0
          state: true
      - script.execute:
          id: light_set_state
          light_group: 2
          light_index: 0
          state: true
      - lambda: |-
          if (0 < id(gb_lights_1).size()) {
            auto call = id(gb_lights_1)[0]->turn_on();
            call.set_rgb(0, 1, 0);
            call.perform();
          }
          if (0 < id(gb_lights_2).size()) {
            auto call = id(gb_lights_2)[0]->turn_on();
            call.set_rgb(0, 1, 0);
            call.perform();
          }
    turn_off_action:
      - globals.set:
          id: virtual_state_1
          value: "false"
      - script.execute:
          id: light_set_state
          light_group: 1
          light_index: 0
          state: false
      - script.execute:
          id: light_set_state
          light_group: 2
          light_index: 0
          state: false

  - platform: template
    name: "Virtual Switch 2"
    id: virtual_switch_2
    internal: ${gang_count} < 2
    lambda: "return id(virtual_state_2);"
    turn_on_action:
      - globals.set:
